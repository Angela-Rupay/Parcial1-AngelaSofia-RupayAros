<div class="container mt-4">

<h4 class="text-center mb-4">
Ingrese los datos para registrarse
</h4>

<form onsubmit="registrar(event)">

<div class="row">

<!-- IZQUIERDA -->

<div class="col-md-6">

<div class="mb-3">
<label>Nombres</label>
<input type="text" id="nombres" class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control">
</div>

<div class="mb-3">
<label>Estrato</label>
<input type="number" id="estrato" class="form-control" min="1" max="6">
</div>

<label>Género</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="genero" value="Masculino">
<label class="form-check-label">Masculino</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="genero" value="Femenino">
<label class="form-check-label">Femenino</label>
</div>

</div>

<!-- DERECHA -->

<div class="col-md-6">

<div class="mb-3">
<label>Apellidos</label>
<input type="text" id="apellidos" class="form-control">
</div>

<div class="mb-3">
<label>Teléfono</label>
<input type="text" id="telefono" class="form-control">
</div>

<div class="mb-3">
<label>Fecha Nacimiento</label>
<input type="date" id="fecha" class="form-control">
</div>

<div class="mb-3">
<label>Grupo Sanguíneo</label>

<select id="sangre" class="form-select">

<option selected disabled>Select</option>
<option>O+</option>
<option>O-</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>AB+</option>

</select>

</div>

</div>

</div>

<!-- ACTIVIDADES -->

<div class="mt-3">

<label>Actividades Favoritas</label>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Futbol">
<label class="form-check-label">Futbol</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Baloncesto">
<label class="form-check-label">Baloncesto</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Voleibol">
<label class="form-check-label">Voleibol</label>
</div>

<div class="form-check">
<input class="form-check-input" type="checkbox" value="Ciclismo">
<label class="form-check-label">Ciclismo</label>
</div>

</div>

<!-- BOTONES -->

<div class="text-center mt-4">

<button class="btn btn-success px-5">
Registrar
</button>

<a href="Admin.html" class="btn btn-danger px-5">
Cancelar
</a>

</div>

</form>
</div>



</body>
</html>
